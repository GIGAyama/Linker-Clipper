<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- 角丸背景 -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- 開いた本 -->
  <g transform="translate(64,66)">
    <!-- 左ページ -->
    <path d="M-4,-26 C-14,-30 -38,-30 -42,-22 L-42,20 C-42,28 -14,24 -4,24 Z" fill="#ffffff" opacity="0.95"/>
    <!-- 右ページ -->
    <path d="M4,-26 C14,-30 38,-30 42,-22 L42,20 C42,28 14,24 4,24 Z" fill="#ffffff" opacity="0.85"/>
    <!-- 背表紙の影 -->
    <rect x="-4" y="-26" width="8" height="50" rx="1" fill="#dcfce7" opacity="0.7"/>
    <!-- 左ページのテキスト線 -->
    <line x1="-34" y1="-14" x2="-12" y2="-16" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-34" y1="-4" x2="-12" y2="-6" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-34" y1="6" x2="-12" y2="4" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-34" y1="14" x2="-20" y2="12" stroke="#86efac" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 右ページのテキスト線 -->
    <line x1="12" y1="-16" x2="34" y2="-14" stroke="#bbf7d0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="-6" x2="34" y2="-4" stroke="#bbf7d0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12" y1="4" x2="34" y2="6" stroke="#bbf7d0" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- リンクチェーンアイコン（右下） -->
  <g transform="translate(88,38) rotate(-45)">
    <rect x="-14" y="-5" width="16" height="10" rx="5" fill="none" stroke="#ffffff" stroke-width="3"/>
    <rect x="2" y="-5" width="16" height="10" rx="5" fill="none" stroke="#ffffff" stroke-width="3"/>
    <line x1="2" y1="0" x2="6" y2="0" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
